    observed_behavior:
      Major human-first CLI refactor. New top-level `booktx guide`
      command (commands/guide.py, human_guide.py, rendering_guide.py) that resolves
      the current lifecycle stage and prints the next human and agent actions. `booktx
      status` (workflows/root.py, rendering.py, cli_support.py) now also includes the
      guide result. New `booktx judge prepare-grammar` command that creates a grammar-only
      revision profile and writes isolated judge instructions in one step. New glossary
      subcommands `remove`, `reset`, `mandate`, and `audit` (commands/glossary.py, workflows/glossary.py)
      wrapping the underlying context term workflows. New command_catalog.py centralizes
      human-first command descriptors (audience, runtime mode, write intent, examples,
      next-action hints) and patches --help output via apply_command_catalog. Removed
      the `translation` group alias (only `translate` remains), the `actor` and `harness`
      identity groups (replaced by `booktx identity set` and `booktx identity clear`),
      the `whoami` alias under the `identity` group, and the root-level `next` and `next-chapter`
      commands. Updated agents_md.py, command_hints.py, and tests to use the new commands
      and assertion language.
    public_impact: public
    decision: accepted
    target_entry_key: cli-human-first
