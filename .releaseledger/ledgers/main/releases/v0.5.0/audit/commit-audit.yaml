    observed_behavior:
      Adds a Windows branch to _process_alive that probes liveness
      through kernel32 OpenProcess with PROCESS_QUERY_LIMITED_INFORMATION so the v3
      store can detect stale locks on Windows. Replaces the silent shutil.rmtree(ignore_errors=True)
      on the lock directory with a guarded repair that surfaces a clear "could not be
      repaired" error when the directory cannot be removed, and adds a regression test.
    public_impact: public
    decision: accepted
    evidence_subject: "fix: fix transations on windows"
    target_entry_id: entry-0006
