    observed_behavior:
      "Completes the v3 store story. Expands the store doctor with
      v3-aware integrity checks and the migration module with a real plan/apply flow:
      inspect, dry-run, write, verify parity, and roll back via a stamped backup directory
      with sha256 receipts and a JSON report. Adds StoreMigrationPlan, StoreMigrationResult,
      StoreTransactionJournal, and StoreTransactionWrite models and a commit_v3_transaction
      journal that acquires a store-root write lock, stages writes, verifies expected
      state, and cleans up on success. Exposes the new options on translate migrate-store:
      --to v2|v3, --json, --allow-source-drift, --backup-dir, --keep-legacy-copy, and
      --stale-lock-policy reject|repair. Replaces remaining direct load_translation_store
      / write_translation_store call sites with the repository API and adds parity fixtures
      plus a backend-parity test that exercises v2 and v3 through the same flows."
    public_impact: public
    decision: accepted
    evidence_subject: "feat: migration and rollback for v3 storage added"
    target_entry_id: entry-0002
