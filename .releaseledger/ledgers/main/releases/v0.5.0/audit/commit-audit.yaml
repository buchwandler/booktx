      "Adds a per-task tasks/TASK.agent.md brief and a translate lint-block
      command for read-only ingest block validation. Centralizes the source-only directive
      prefixes (# glossary:, # style:, # termbase:) in booktx/block_protocol.py. Extends
      booktx translate todo-next with --write --resume --format block so a bounded todo
      can be created and the first block emitted in one call, and updates the agents_md
      templates and human-workflow docs to point at the new command form. Adds translate_lint_block_command
      and translate_todo_next_command helpers in booktx/command_hints.py and the rendering
      hooks used by todo_status."
    public_impact: public
    decision: accepted
    evidence_subject: "feat: translation run improvements"
