    observed_behavior:
      Introduces the booktx/store package with a backend-neutral TranslationStoreRepository
      interface, an open_translation_store factory, a v3 shard-based repository, a transactional
      commit journal, a store doctor, and a v1->v2 migration helper. Migrates acceptance,
      review, judge, identity, and pass_through writers to mutate the canonical store
      through the new repository API instead of direct file load/save. Adds --to, --json,
      and --keep-legacy-copy to translate migrate-store and rewrites the catalog summary
      for it. Documents the v3 shard layout and removes the claim that v3 is not implemented.
    public_impact: public
    decision: accepted
    evidence_subject: "feat: new translation storage v3"
    target_entry_id: entry-0001
