name: Quality gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "release/**"

jobs:
  quality:
    name: quality / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: python -m pip install ".[dev]"

      - name: Run canonical quality gate
        run: python scripts/quality_gate.py --require-clean
